version: "3.9"

services:
  mongo:
    image: mongo:latest
    container_name: blog-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: blog-platform
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example123.
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example123.
      ME_CONFIG_MONGODB_SERVER: mongo

  blog-api:
    image: mcr.microsoft.com/dotnet/aspnet:10.0
    container_name: blog-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5000:80"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MongoDB__ConnectionString: "mongodb://root:example123.@mongo:27017"
      MongoDB__Database: "blog-platform"
    depends_on:
      - mongo

  redis:
    image: redis:latest
    container_name: blog-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
volumes:
  mongo-data: